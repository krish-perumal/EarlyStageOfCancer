<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CancerLens AI</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body>

    <div class="container-fluid">

        <!-- HEADER -->
        <header class="dashboard-header">

            <div class="header-left">
                <div class="brand">

                    <div class="brand-icon">
                        🩺
                    </div>

                    <div class="brand-text">
                        <span class="brand-name">
                            CancerLens <span class="brand-ai">AI</span>
                        </span>

                        <span class="brand-tagline">
                            Detect Early. Save Lives.
                        </span>
                    </div>

                </div>
            </div>

            <div class="header-right">

                <div class="search-wrapper">
                    <input type="text" class="search-input" placeholder="Search anything...">
                </div>

                <button class="header-icon-btn">
                    🔔
                    <span class="notification-badge">3</span>
                </button>

                <div class="user-profile">
                    <div class="user-avatar">KA</div>
                    <span class="user-name">Krish AR</span>
                </div>

            </div>

        </header>

        <!-- BODY -->
        <div class="cl-dashboard-layout">

            <!-- SIDEBAR -->

            <aside class="cl-sidebar-fixed">

                <div class="cl-sidebar-header">
                    <h4>CancerLens AI</h4>
                </div>

                <div class="cl-sidebar-menu">

                    <div class="menu-item active" onclick="loadPage('dashboard',this)">
                        Dashboard
                    </div>

                    <div class="menu-item" onclick="loadPage('risk',this)">
                        Risk Assessment
                    </div>

                    <div class="menu-item" onclick="loadPage('screening',this)">
                        Screening & Tests
                    </div>

                    <div class="menu-item" onclick="loadPage('results',this)">
                        My Results
                    </div>

                    <div class="menu-item" onclick="loadPage('insights',this)">
                        Health Insights
                    </div>

                    <div class="menu-item" onclick="loadPage('records',this)">
                        Medical Records
                    </div>

                    <div class="menu-item" onclick="loadPage('appointments',this)">
                        Appointments
                    </div>

                    <div class="menu-item" onclick="loadPage('education',this)">
                        Education Center
                    </div>

                    <div class="menu-item" onclick="loadPage('research',this)">
                        Research & Trials
                    </div>

                    <div class="menu-item" onclick="loadPage('community',this)">
                        Community
                    </div>

                    <div class="menu-item" onclick="loadPage('settings',this)">
                        Settings
                    </div>

                </div>

            </aside>

            <!-- CONTENT -->

            <main class="cl-content-wrapper">

                <div class="cl-main-content p-4">

                    <div id="content-area">

                        <div class="text-center py-5">
                            <div class="spinner-border text-success"></div>
                            <p class="mt-3">Loading Dashboard...</p>
                        </div>

                    </div>

                </div>

            </main>

        </div>


    </div>

    <!-- PAGE LOADER -->
    <script>

        async function loadPage(page, el = null) {

            const contentArea =
                document.getElementById("content-area");

            contentArea.innerHTML = `
                <div class="text-center py-5">
                    <div class="spinner-border text-success"></div>
                    <p class="mt-3">Loading...</p>
                </div>
            `;

            try {

                const response =
                    await fetch(`pages/${page}.html`);

                if (!response.ok) {
                    throw new Error(
                        `Cannot load ${page}.html`
                    );
                }

                const html =
                    await response.text();

                contentArea.innerHTML = html;

                document
                    .querySelectorAll(".menu-item")
                    .forEach(item =>
                        item.classList.remove("active")
                    );

                if (el) {
                    el.classList.add("active");
                }

                window.scrollTo({
                    top: 0,
                    behavior: "smooth"
                });

            } catch (error) {

                contentArea.innerHTML = `
                    <div class="alert alert-danger">
                        Failed to load page:
                        ${page}.html
                    </div>
                `;

                console.error(error);
            }

        }

        document.addEventListener(
            "DOMContentLoaded",
            () => {

                const firstMenu =
                    document.querySelector(
                        ".menu-item.active"
                    );

                loadPage(
                    "dashboard",
                    firstMenu
                );

            }
        );

    </script>

</body>

</html>
