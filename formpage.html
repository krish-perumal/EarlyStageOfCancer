<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Early stage of cancer</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="brain-page">

    <!-- Hero -->
    <section class="brain-hero">
        <div class="brain-hero-overlay"></div>

        <button class="stage-btn">Find the Stage</button>

        <div class="hero-label">
            <span class="hero-icon">🎗️</span>
            <h2>Early Stage of Cancer</h2>
        </div>
    </section>

    <!-- Content -->
    <section class="brain-content">

<div class="form-page">

    <!-- Top Image -->
    <div class="form-hero"></div>

    <!-- Form Section -->
    <div class="form-container">

        <h2 class="form-title">Early Stage of Cancer</h2>

        <!-- Basic Info -->
        <div class="form-grid">

            <label>Name</label>
            <input type="text" value="Vijay">

            <label>Age</label>
            <input type="number" value="30">

            <label>Sex</label>
            <select>
                <option>Male</option>
                <option>Female</option>
            </select>

            <label>Stage of Cancer</label>
            <select>
                <option>1 Stage</option>
                <option>2 Stage</option>
            </select>

            <label>Cancer Type</label>
            <select>
                <option>Blood Cancer</option>
                <option>Brain Cancer</option>
            </select>

        </div>

        <!-- Blood Count -->
        <h3 class="section-head">Blood Count</h3>
        <div class="form-grid-3">
            <div><label>Haemoglobin</label><input type="text" value="32.5"></div>
            <div><label>RCB Count</label><input type="text" value="25.7"></div>
            <div><label>Total WBC Count</label><input type="text" value="30"></div>
        </div>

        <!-- Red Cells -->
        <h3 class="section-head">Red Cells Absolute Value</h3>
        <div class="form-grid-3">
            <div><label>Packed Cells</label><input type="text" value="30"></div>
            <div><label>Mean Corpusator</label><input type="text" value="30"></div>
            <div><label>Mean Vol</label><input type="text" value="30"></div>
        </div>

        <!-- Differential -->
        <h3 class="section-head">Differential Count</h3>
        <div class="form-grid-2">
            <div><label>Neutrophils</label><input type="text" value="30"></div>
            <div><label>Lymphocytes</label><input type="text" value="30"></div>
            <div><label>Eosinphil</label><input type="text" value="30"></div>
            <div><label>Mono cytes</label><input type="text" value="30"></div>
            <div><label>Basophils</label><input type="text" value="30"></div>
        </div>
<a href="solutionpage.html">
        <button class="result-btn">Results</button>

</a>

    </div>
</div>


    </section>

</div>

</body>
</html>
